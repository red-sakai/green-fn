name: Pushing a very productive work
run-name: ${{ github.actor }} is making a very productive work

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 5 * * *" # Runs at 05:30 UTC - 01:30 in PH time
  workflow_dispatch:

jobs:
  onAndOffFunction:
    if: vars.WORKFLOW_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions: 
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Python Setup
        uses: actions/setup-python@v3
        with:
          python-version: "3.14"

      - name: Pull changes
        run: git pull --rebase origin main

      - name: Run build.py
        run: python build.py

      - name: Commit and push
        run: |
          git config --global user.email "jheredmiguelcrepublica@iskolarngbayan.pup.edu.ph"
          git config --global user.name "red-sakai"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Productive Work"
          git push
